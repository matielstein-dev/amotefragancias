<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto - Amote </title>
  <link rel="icon" href="imagenes/WhatsApp Image 2026-05-21 at 18.14.50.jpeg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

 <header>
        <img src="imagenes/WhatsApp Image 2026-05-21 at 18.14.50.jpeg" class="logo"> 
        <h1>Contacto</h1>
        <input type="checkbox" id="menu-toggle" class="menu-checkbox">
        <label for="menu-toggle" class="menu-btn" aria-label="Mostrar menú">
          <span></span>
          <span></span>
          <span></span>
        </label>
    <nav class="menu">
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="textiles.html">Textiles</a></li>
        <li><a href="difosores.html">Difusores</a></li>
        <li><a href="aerosoles.html">Aerosoles</a></li>         
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>
  </header>
<main class="contenedor">
    <section class="formulario-seccion">
      <h2>Envíanos un mensaje</h2>

<!-- Formulario de consulta o pedido -->
            <form id="form-contacto" class="formulario" novalidate>
                <h2>Hacé tu consulta o pedido</h2>

                <label for="nombre">Nombre completo *</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>

                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" placeholder="11 1234-5678">

                <label for="email">Correo electrónico *</label>
                <input type="email" id="email" name="email" placeholder="tuemail@ejemplo.com" required>

                <label for="tipo">Tipo de consulta</label>
                <select id="tipo" name="tipo">
                    <option value="">Seleccioná una opción</option>
                    <option value="delivery">Pedido con delivery</option>
                    <option value="especial">Pedido especial</option>
                    <option value="mayorista">Venta mayorista</option>
                    <option value="otro">Otro</option>
                </select>

                <label for="mensaje">Mensaje *</label>
                <textarea id="mensaje" name="mensaje" rows="4" placeholder="Contanos tu consulta o pedido..." required></textarea>

                <button type="submit" class="boton-primario">Enviar consulta</button>

                <p id="msg-ok" class="oculto mensaje-ok">¡Consulta enviada! Te respondemos pronto.</p>
                <p id="msg-error" class="oculto mensaje-error">Completá los campos obligatorios (*).</p>
            </form>

    </section>
  </main>

 <footer>
     <h1>Proyecto Final de Matias Elstein</h1>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const form = document.getElementById('form-contacto');
      const msgOk = document.getElementById('msg-ok');
      const msgErr = document.getElementById('msg-error');

      // Asegurarse de que los mensajes estén ocultos al cargar
      if (msgOk) msgOk.classList.add('oculto');
      if (msgErr) msgErr.classList.add('oculto');

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        if (form.checkValidity()) {
          if (msgErr) msgErr.classList.add('oculto');
          if (msgOk) msgOk.classList.remove('oculto');
          form.reset();
        } else {
          if (msgOk) msgOk.classList.add('oculto');
          if (msgErr) msgErr.classList.remove('oculto');
          form.reportValidity();
        }
      });
    });
  </script>

</body>
</html>
